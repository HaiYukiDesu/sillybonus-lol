<!DOCTYPE html>
<html lang="en">
<head>
    <title>wow why did i make this</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; color: white; font-family: monospace; }
        #canvas-container { display: none; }
        #landing-page {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        #landing-page h1 { font-size: 2.5rem; color: #58a6ff; }
        #landing-page button {
            background-color: #21262d; border: 1px solid #30362d; color: #c9d1d9;
            padding: 15px 30px; margin: 10px; border-radius: 6px; cursor: pointer;
            font-size: 1rem; transition: all 0.2s ease;
        }
        #landing-page button:hover { border-color: #8b949e; background-color: #30363d; }
        #loading { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 1.5rem; }
        #info-box {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 10px 15px;
            border-radius: 5px;
            border: 1px solid #30362d;
        }
        #country-name { font-size: 1.2rem; font-weight: bold; color: #58a6ff; }
        #country-time { font-size: 1rem; color: #c9d1d9; }
    </style>
</head>
<body>
    <div id="landing-page">
        <h1>earth or world idk (send help)</h1>
        <button id="simple-mode-btn">Simple Mode (uses no data but look awfully bad)</button>
        <button id="cinematic-mode-btn">Cinematic Mode(uses 30 MB of data)</button>
    </div>
    <div id="loading">Loading data...</div>
    <div id="canvas-container"></div>
    <div id="info-box">
        <div id="country-name"></div>
        <div id="country-time"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ConvexGeometry } from 'three/addons/geometries/ConvexGeometry.js';

        const pleaseJustLetMeGoButton = document.getElementById('simple-mode-btn');
        const theyHaveMyFamilyButton = document.getElementById('cinematic-mode-btn');
        const theFirstThingYouSeeBeforeTheEnd = document.getElementById('landing-page');
        const imBeggingYouPleaseHurry = document.getElementById('loading');
        const theVoidWhereDreamsDie = document.getElementById('canvas-container');
        const uselessFactsToDistractYou = document.getElementById('info-box');
        const whereAmI = document.getElementById('country-name');
        const howMuchTimeIsLeft = document.getElementById('country-time');
        
        let theStageForThisNightmare, theAllSeeingEyeThatJudges, theThingThatMakesItAllTooReal, iHaveNoControl, theTickingBomb, theMaestroOfMisery, beamOfImminentDoom, theTremblingHand;
        const myFingersAreShaking = {};
        let whichButtonDoIPress;
        let placesICanNeverGo = [];
        let thePlaceImStuckInNow;
        let everySecondIsAnEternity;
        let didIJustHearSomething = 0;
        const theSilenceIsDeafening = 100;

        function loadThisOrElse(src) {
            return new Promise((resolve, reject) => {
                if (document.querySelector(`script[src="${src}"]`)) {
                    resolve();
                    return;
                }
                const script = document.createElement('script');
                script.src = src;
                script.onload = () => resolve();
                script.onerror = () => reject(new Error(`Script load error for ${src} AND NOW IT'S ALL OVER`));
                document.body.appendChild(script);
            });
        }

        function makeAPerfectCircleOrSuffer() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const context = canvas.getContext('2d');
            context.beginPath();
            context.arc(32, 32, 30, 0, 2 * Math.PI);
            context.fillStyle = 'white';
            context.fill();
            return new THREE.CanvasTexture(canvas);
        }
        const theCircleOfDespair = makeAPerfectCircleOrSuffer();

        function startThePain(useBloom = false, controlType = 'orbit') {
            theStageForThisNightmare = new THREE.Scene();
            theStageForThisNightmare.fog = new THREE.FogExp2(0x000000, 0.00005);
            theAllSeeingEyeThatJudges = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500000);
            theThingThatMakesItAllTooReal = new THREE.WebGLRenderer({ antialias: true });
            theThingThatMakesItAllTooReal.setSize(window.innerWidth, window.innerHeight);
            theVoidWhereDreamsDie.appendChild(theThingThatMakesItAllTooReal.domElement);
            theAllSeeingEyeThatJudges.position.z = 200;

            theTickingBomb = new THREE.Clock();
            whichButtonDoIPress = controlType;
            
            iHaveNoControl = new OrbitControls(theAllSeeingEyeThatJudges, theThingThatMakesItAllTooReal.domElement);
            iHaveNoControl.enableDamping = true;
            iHaveNoControl.dampingFactor = 0.05;
            
            if (controlType === 'hybrid') {
                iHaveNoControl.minDistance = 50;
                iHaveNoControl.maxDistance = 200000;
                iHaveNoControl.enablePan = true;
                window.addEventListener('keydown', (e) => myFingersAreShaking[e.code] = true);
                window.addEventListener('keyup', (e) => myFingersAreShaking[e.code] = false);
            } else { 
                iHaveNoControl.minDistance = 20;
                iHaveNoControl.maxDistance = 400;
            }

            const renderScene = new RenderPass(theStageForThisNightmare, theAllSeeingEyeThatJudges);
            theMaestroOfMisery = new EffectComposer(theThingThatMakesItAllTooReal);
            theMaestroOfMisery.addPass(renderScene);

            if (useBloom) {
                const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
                bloomPass.threshold = 0;
                bloomPass.strength = 1.2;
                bloomPass.radius = 0.5;
                theMaestroOfMisery.addPass(bloomPass);
            }
            
            window.addEventListener('resize', theWallsAreClosingIn);
            keepRunningDontLookBack();
        }
        
        function theWallsAreClosingIn() {
            theAllSeeingEyeThatJudges.aspect = window.innerWidth / window.innerHeight;
            theAllSeeingEyeThatJudges.updateProjectionMatrix();
            theThingThatMakesItAllTooReal.setSize(window.innerWidth, window.innerHeight);
            theMaestroOfMisery.setSize(window.innerWidth, window.innerHeight);
        }

        function keepRunningDontLookBack() {
            requestAnimationFrame(keepRunningDontLookBack);
            const delta = theTickingBomb.getDelta();
            const now = theTickingBomb.elapsedTime * 1000;

            if (whichButtonDoIPress === 'hybrid') runForYourLife(delta);
            
            if (beamOfImminentDoom && now - didIJustHearSomething > theSilenceIsDeafening) {
                isAnyoneOutThere();
                didIJustHearSomething = now;
            }

            iHaveNoControl.update(delta);
            theMaestroOfMisery.render();
        }

        function runForYourLife(delta) {
            const moveSpeed = 500 * delta;
            const forward = new THREE.Vector3();
            theAllSeeingEyeThatJudges.getWorldDirection(forward);
            const right = new THREE.Vector3().crossVectors(theAllSeeingEyeThatJudges.up, forward).normalize();
            const horizontalMove = new THREE.Vector3();
            if (myFingersAreShaking['KeyW']) horizontalMove.add(forward);
            if (myFingersAreShaking['KeyS']) horizontalMove.sub(forward);
            if (myFingersAreShaking['KeyD']) horizontalMove.sub(right);
            if (myFingersAreShaking['KeyA']) horizontalMove.add(right);
            if(horizontalMove.lengthSq() > 0) {
                horizontalMove.normalize().multiplyScalar(moveSpeed);
                theAllSeeingEyeThatJudges.position.add(horizontalMove);
                iHaveNoControl.target.add(horizontalMove);
            }
            const verticalMove = new THREE.Vector3();
            if (myFingersAreShaking['Space']) verticalMove.y = moveSpeed;
            if (myFingersAreShaking['ShiftLeft']) verticalMove.y = -moveSpeed;
            if (verticalMove.lengthSq() > 0) {
                theAllSeeingEyeThatJudges.position.add(verticalMove);
                iHaveNoControl.target.add(verticalMove);
            }
        }
        
        async function buildTheWorldThatImprisonedMe() {
            const globeRadius = 100;
            
            const atmosphereGeometry = new THREE.SphereGeometry(globeRadius, 64, 64);
            const atmosphereMaterial = new THREE.MeshBasicMaterial({ color: 0x0a192f, transparent: true, opacity: 0.2 });
            const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
            theStageForThisNightmare.add(atmosphere);

            const geoResponse = await fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson');
            const geoData = await geoResponse.json();
            
            const borderMaterial = new THREE.PointsMaterial({ color: 0x304a6e, size: 0.3, sizeAttenuation: true });
            const highlightMaterial = new THREE.PointsMaterial({
                color: 0x87CEFA,
                size: 0.6,
                sizeAttenuation: true,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            geoData.features.forEach(feature => {
                if (!feature.geometry) return;
                const countryObj = new THREE.Object3D();
                countryObj.userData.name = feature.properties.ADMIN;
                const isoA2 = feature.properties.ISO_A2;
                countryObj.userData.iso_a2 = isoA2;

                if (window.ct) {
                    const countryTimezones = window.ct.getTimezonesForCountry(isoA2); 
                    if (countryTimezones && countryTimezones.length > 0) {
                        countryObj.userData.timezone = countryTimezones[0].name; 
                    }
                }

                const processPolygon = (polygonRing) => {
                    const positions = [];
                    const points3D = [];
                    for (const point of polygonRing) {
                        const [lon, lat] = point;
                        const phi = (90 - lat) * (Math.PI / 180);
                        const theta = (lon + 180) * (Math.PI / 180);
                        const x = -globeRadius * Math.sin(phi) * Math.cos(theta);
                        const y = globeRadius * Math.cos(phi);
                        const z = globeRadius * Math.sin(phi) * Math.sin(theta);
                        positions.push(x, y, z);
                        points3D.push(new THREE.Vector3(x, y, z));
                    }
                    const geometry = new THREE.BufferGeometry();
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(positions), 3));
                    
                    const borderPoints = new THREE.Points(geometry, borderMaterial);
                    countryObj.add(borderPoints);

                    const highlightPoints = new THREE.Points(geometry.clone(), highlightMaterial);
                    highlightPoints.visible = false;
                    countryObj.add(highlightPoints);

                    if (points3D.length > 3) {
                        const hitboxGeometry = new ConvexGeometry(points3D);
                        const hitboxMaterial = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 });
                        const hitbox = new THREE.Mesh(hitboxGeometry, hitboxMaterial);
                        countryObj.add(hitbox);
                    }
                };

                if (feature.geometry.type === 'Polygon') {
                    processPolygon(feature.geometry.coordinates[0]);
                } else if (feature.geometry.type === 'MultiPolygon') {
                    feature.geometry.coordinates.forEach(p => processPolygon(p[0]));
                }
                
                placesICanNeverGo.push(countryObj);
                theStageForThisNightmare.add(countryObj);
            });

            beamOfImminentDoom = new THREE.Raycaster();
            theTremblingHand = new THREE.Vector2();
            window.addEventListener('mousemove', everyMoveIsBeingWatched);
            iHaveNoControl.addEventListener('start', () => {
                if (everySecondIsAnEternity) clearInterval(everySecondIsAnEternity);
                uselessFactsToDistractYou.style.display = 'none';
            });
        }
        
        function isAnyoneOutThere() {
            if (!theTremblingHand || !beamOfImminentDoom) return;
            beamOfImminentDoom.setFromCamera(theTremblingHand, theAllSeeingEyeThatJudges);
            
            const intersects = beamOfImminentDoom.intersectObjects(placesICanNeverGo, true);
            const hitboxIntersect = intersects.find(intersect => intersect.object.type === 'Mesh');

            if (hitboxIntersect) {
                const newIntersected = hitboxIntersect.object.parent;
                if (thePlaceImStuckInNow !== newIntersected) {
                    if (thePlaceImStuckInNow) {
                        const highlight = thePlaceImStuckInNow.children[1];
                        if (highlight) highlight.visible = false;
                    }
                    
                    thePlaceImStuckInNow = newIntersected;
                    const highlight = thePlaceImStuckInNow.children[1];
                    if (highlight) highlight.visible = true;
                    document.body.style.cursor = 'pointer';

                    if (everySecondIsAnEternity) clearInterval(everySecondIsAnEternity);
                    const countryName = thePlaceImStuckInNow.userData.name;
                    const isoA2 = thePlaceImStuckInNow.userData.iso_a2;
                    whereAmI.textContent = countryName;

                    const updateTime = () => {
                        if (window.ct) {
                            const timezones = window.ct.getTimezonesForCountry(isoA2); 
                            if (timezones && timezones.length > 0) {
                                const mainTimezone = timezones[0].name;
                                const date = new Date();
                                const timeString = date.toLocaleTimeString('en-GB', { timeZone: mainTimezone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
                                howMuchTimeIsLeft.textContent = `${timeString} (${mainTimezone.split('/')[1] ? mainTimezone.split('/')[1].replace(/_/g,' ') : mainTimezone})`;
                            } else {
                                howMuchTimeIsLeft.textContent = "Timezone data unavailable. I'm lost.";
                            }
                        } else {
                            howMuchTimeIsLeft.textContent = "Timezone library not loaded. It's hopeless.";
                        }
                    };
                    updateTime();
                    everySecondIsAnEternity = setInterval(updateTime, 1000);
                    uselessFactsToDistractYou.style.display = 'block';
                }
            } else {
                if (thePlaceImStuckInNow) {
                    const highlight = thePlaceImStuckInNow.children[1];
                    if (highlight) highlight.visible = false;
                    thePlaceImStuckInNow = null;
                    document.body.style.cursor = 'default';

                    if (everySecondIsAnEternity) clearInterval(everySecondIsAnEternity);
                    uselessFactsToDistractYou.style.display = 'none';
                }
            }
        }
        
        function everyMoveIsBeingWatched(event) {
            if (theTremblingHand) {
                theTremblingHand.x = (event.clientX / window.innerWidth) * 2 - 1;
                theTremblingHand.y = -(event.clientY / window.innerHeight) * 2 + 1;
            }
        }

        function aSadLittleBlueDot() {
            const positions = []; const globeRadius = 15;
            for(let i=0;i<20000;i++){
                const phi=Math.acos(-1+(2*i)/20000);
                const theta=Math.sqrt(20000*Math.PI)*phi;
                positions.push(globeRadius*Math.cos(theta)*Math.sin(phi),globeRadius*Math.sin(theta)*Math.sin(phi),globeRadius*Math.cos(phi));
            }
            const g=new THREE.BufferGeometry();
            g.setAttribute('position',new THREE.Float32BufferAttribute(new Float32Array(positions),3));
            const m=new THREE.PointsMaterial({color:0x4169E1,size:0.2,sizeAttenuation:true, map: theCircleOfDespair, transparent: true, alphaTest: 0.5});
            theStageForThisNightmare.add(new THREE.Points(g,m));
        }

        function theColdUncaringVoid() {
            const positions = [];
            for (let i = 0; i < 10000; i++) {
                positions.push(THREE.MathUtils.randFloatSpread(1000), THREE.MathUtils.randFloatSpread(1000), THREE.MathUtils.randFloatSpread(1000));
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(positions), 3));
            const material = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, map: theCircleOfDespair, transparent: true, alphaTest: 0.5 });
            theStageForThisNightmare.add(new THREE.Points(geometry, material));
        }
        
        async function chooseTheEasyWayOut() {
            theFirstThingYouSeeBeforeTheEnd.style.display = 'none';
            theVoidWhereDreamsDie.style.display = 'block';
            startThePain(false, 'orbit');
            aSadLittleBlueDot();
            theColdUncaringVoid();
        }

        async function makeTheSufferingBeautiful() {
            theFirstThingYouSeeBeforeTheEnd.style.display = 'none';
            imBeggingYouPleaseHurry.style.display = 'block';
            
            await Promise.all([
                loadThisOrElse('https://cdn.jsdelivr.net/npm/city-timezones@1.3.2/index.min.js'),
                fetch('https://cdn.itbon.us/hygdata.csv').then(res => res.text())
            ]).then(async ([_, csvText]) => {
                const starData = Papa.parse(csvText, { header: true, dynamicTyping: true }).data;
                
                imBeggingYouPleaseHurry.style.display = 'none';
                theVoidWhereDreamsDie.style.display = 'block';
                startThePain(true, 'hybrid');
                await buildTheWorldThatImprisonedMe();
                
                const positions = [], colors = [], sizes = [];
                const color = new THREE.Color();

                for (const star of starData) {
                    if (typeof star.ra !== 'number' || typeof star.dec !== 'number' || typeof star.absmag !== 'number' || typeof star.dist !== 'number') continue;
                    const raRad = star.ra * (15 * Math.PI / 180);
                    const decRad = star.dec * (Math.PI / 180);
                    let radius = 2000 + (star.dist * 500);
                    if (radius <= 2000) radius = 400000;
                    positions.push(radius * Math.cos(raRad) * Math.cos(decRad), radius * Math.sin(raRad) * Math.cos(decRad), radius * Math.sin(decRad));

                    const ci = star.ci || 0;
                    if (ci <= -0.3) color.set(0x6070ff);
                    else if (ci <= 0.0) color.set(0x6676ff);
                    else if (ci <= 0.3) color.set(0xffffff);
                    else if (ci <= 0.6) color.set(0xfff4f1);
                    else if (ci <= 0.9) color.set(0xffe0c8);
                    else if (ci <= 1.5) color.set(0xffd4af);
                    else color.set(0xffb56c);
                    colors.push(color.r, color.g, color.b);

                    let size = (8 - star.absmag) * 5;
                    if (size < 1.5) size = 1.5;
                    if (size > 30) size = 30;
                    sizes.push(size);
                }
                
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(positions), 3));
                geometry.setAttribute('color', new THREE.Float32BufferAttribute(new Float32Array(colors), 3));
                geometry.setAttribute('pointSize', new THREE.Float32BufferAttribute(new Float32Array(sizes), 1));
            
                const material = new THREE.PointsMaterial({ 
                    size: 3, vertexColors: true, sizeAttenuation: true, transparent: true, 
                    blending: THREE.AdditiveBlending, map: theCircleOfDespair, alphaTest: 0.1
                });
                
                material.onBeforeCompile = shader => {
                    shader.vertexShader = 'attribute float pointSize;\n' + shader.vertexShader;
                    shader.vertexShader = shader.vertexShader.replace('gl_PointSize = size;','gl_PointSize = pointSize * size;');
                };
                theStageForThisNightmare.add(new THREE.Points(geometry, material));
            }).catch(error => {
                console.error("I failed to load the resources, it's all my fault:", error);
                imBeggingYouPleaseHurry.textContent = "Error loading. It's over. Please refresh.";
            });
        }

        pleaseJustLetMeGoButton.addEventListener('click', chooseTheEasyWayOut);
        theyHaveMyFamilyButton.addEventListener('click', makeTheSufferingBeautiful);
    </script>
</body>
</html>
