<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Beast: A Dream PC Build</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glow-color: #00ffff;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: #0a0a0a;
            background-image: 
                radial-gradient(circle at 25% 30%, rgba(10, 10, 30, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 75% 70%, rgba(30, 10, 10, 0.5) 0%, transparent 50%);
            animation: background-pan 30s linear infinite;
        }

        @keyframes background-pan {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .god-tier-title {
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px var(--glow-color),
                0 0 30px var(--glow-color),
                0 0 40px var(--glow-color),
                0 0 55px var(--glow-color),
                0 0 75px var(--glow-color);
        }

        .component-card-wrapper {
            perspective: 1000px;
        }
        
        .component-card {
            background: rgba(17, 24, 39, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            transition: all 0.2s ease-out;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .component-card:hover {
            box-shadow: 0 25px 50px -12px rgba(0, 255, 255, 0.25);
            border-color: var(--glow-color);
        }

        .component-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 0.5rem;
            border: 2px solid transparent;
            background: linear-gradient(45deg, rgba(0, 255, 255, 0), var(--glow-color), rgba(0, 255, 255, 0)) border-box;
            -webkit-mask: 
                linear-gradient(#fff 0 0) padding-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .component-card:hover::before {
            opacity: 0.5;
        }
        
        .component-image {
            height: 128px;
            width: 128px;
            object-fit: contain;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.3));
        }
        
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glow-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00dddd;
        }

        .detail-list {
            text-align: left;
            font-size: 0.8rem;
            width: 100%;
            margin-top: 0.75rem;
            color: #9ca3af;
        }
        .detail-list li {
            margin-bottom: 0.25rem;
        }
        .detail-list strong {
            color: #e5e7eb;
        }
    </style>
</head>
<body class="text-gray-200 overflow-x-hidden">

    <div class="container mx-auto px-4 py-12 md:py-20">

        <header class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-black uppercase god-tier-title">The Beast</h1>
            <p class="text-cyan-400 mt-4 text-lg md:text-xl tracking-widest">BUILD MANIFEST</p>
        </header>

        <main id="component-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </main>
        
        <footer class="text-center mt-16 text-gray-500">
            <p>Forged in the digital fires for a true enthusiast.</p>
        </footer>

    </div>

    <script>
        const components = [
            {
                image: 'https://placehold.co/256x256/0a0a0a/00ffff?text=Threadripper',
                title: 'CPU',
                name: 'AMD Ryzen Threadripper Pro 8995WX',
                description: 'The 96-core heart of the machine.',
                link: 'https://www.amd.com/en/processors/ryzen-threadripper-pro'
            },
            {
                image: 'https://placehold.co/256x256/0a0a0a/00ffff?text=WRX90',
                title: 'Motherboard',
                name: 'ASUS Pro WS WRX90E-SAGE SE',
                description: 'The only motherboard capable of taming the Threadripper, providing eight channels of memory and server-grade stability.',
                link: 'https://www.asus.com/us/motherboards-components/motherboards/workstation/pro-ws-wrx90e-sage-se/'
            },
            {
                image: 'https://placehold.co/256x256/0a0a0a/00ffff?text=1TB+RAM',
                title: 'RAM',
                name: '1TB (8x128GB) Crucial DDR5-5600 ECC RDIMM',
                description: 'A full terabyte of Error-Correcting Code server memory. Unquestionable capacity and stability.',
                link: 'https://www.crucial.com/memory/server-ddr5/ct128g56c46u5'
            },
            {
                image: 'https://placehold.co/256x256/0a0a0a/00ffff?text=RTX+5090',
                title: 'GPU',
                name: '3x ASUS ROG Strix GeForce RTX 5090',
                description: 'A trinity of flagship GPUs, each ready for its own custom water block. Unparalleled power for rendering and AI.',
                link: 'https://rog.asus.com/'
            },
            {
                image: 'https://placehold.co/256x256/0a0a0a/00ffff?text=NVMe',
                title: 'Boot Drive',
                name: '4TB WD Black SN8100 PCIe 5.0 NVMe SSD',
                description: 'An isolated, ultra-fast drive for the operating system and core applications, ensuring instant response.',
                link: 'https://www.westerndigital.com/products/internal-drives/wd-black-sn850x-nvme-ssd'
            },
            {
                image: 'https://placehold.co/256x256/0a0a0a/00ffff?text=RAID',
                title: 'Storage Array',
                name: '32TB RAID 0 Array (4x 8TB Crucial T705 SSDs)',
                description: 'Four of the fastest consumer SSDs on an ASUS Hyper M.2 card, striped for maximum performance. Over 50,000 MB/s.',
                link: 'https://www.crucial.com/ssd/t705/ct8000t705ssd3'
            },
            {
                image: 'https://placehold.co/256x256/0a0a0a/00ffff?text=2000W',
                title: 'PSU',
                name: 'Seasonic PRIME TX-2000 ATX 3.1 Titanium',
                description: 'A 2000-watt power plant with Titanium efficiency. Clean, stable power is not a request; it is a demand.',
                link: 'https://seasonic.com/prime-tx'
            },
            {
                image: 'https://placehold.co/256x256/0a0a0a/00ffff?text=V3000+',
                title: 'Case',
                name: 'Lian Li V3000 Plus Super Tower',
                description: 'The only chassis large enough to serve as a worthy cage for the components within. Unmatched space and flexibility.',
                link: 'https://lian-li.com/product/v3000-plus/'
            },
            {
                image: 'https://placehold.co/256x256/0a0a0a/00ffff?text=Panther',
                title: 'Guardian',
                name: 'The Fierce Cat Guardian',
                description: 'A sentinel to stand watch. The final, most critical component.',
                link: 'https://www.etsy.com/market/panther_figurine'
            }
        ];
        
        const coolingSystem = {
            image: 'https://placehold.co/256x256/0a0a0a/00ffff?text=H2O',
            title: 'Cooling System',
            name: 'Dual-Loop Hardline Manifest',
            link: 'https://www.ekwb.com/custom-loop/',
            details: [
                { item: 'CPU Block', name: 'EK-Quantum Velocity² Pro for sTR5' },
                { item: 'GPU Blocks', name: '3x EK-Quantum Vector² for Strix RTX 5090' },
                { item: 'Radiators', name: '3x Hardware Labs Black Ice Nemesis 480GTS' },
                { item: 'Pumps', name: '2x EK-Quantum Kinetic TBE 300 D5 PWM' },
                { item: 'Fans', name: '12x Lian Li UNI FAN SL-INF 120 ARGB' },
                { item: 'Tubing', name: 'Corsair Hydro X Series XT 14mm PMMA' },
                { item: 'Fittings', name: 'Bitspower Black Sparkle Compression (24x)' },
                { item: 'Coolant', name: '2x EK-CryoFuel Solid Cloud White (Concentrate)' }
            ]
        };

        function populateGrid() {
            const grid = document.getElementById('component-grid');
            const allComponents = [...components, coolingSystem];

            allComponents.forEach((component, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'component-card-wrapper reveal';
                wrapper.style.transitionDelay = `${index * 100}ms`;

                const link = document.createElement('a');
                link.href = component.link;
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
                
                const card = document.createElement('div');
                card.className = 'component-card rounded-lg p-6 flex flex-col items-center text-center h-full relative';
                
                let detailsHtml = `<p class="text-gray-400 mt-3 text-sm leading-relaxed">${component.description || ''}</p>`;

                if (component.details) {
                    detailsHtml = '<ul class="detail-list">';
                    component.details.forEach(detail => {
                        detailsHtml += `<li><strong>${detail.item}:</strong> ${detail.name}</li>`;
                    });
                    detailsHtml += '</ul>';
                }

                card.innerHTML = `
                    <img src="${component.image}" alt="${component.title}" class="component-image" onerror="this.onerror=null;this.src='https://placehold.co/256x256/111827/ffffff?text=Image+Error';">
                    <h2 class="text-xl font-bold text-cyan-400 uppercase tracking-wider">${component.title}</h2>
                    <h3 class="text-lg font-semibold mt-2">${component.name}</h3>
                    ${detailsHtml}
                `;
                
                link.appendChild(card);
                wrapper.appendChild(link);
                grid.appendChild(wrapper);
            });
        }

        function setupScrollReveal() {
            const revealElements = document.querySelectorAll('.reveal');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, {
                threshold: 0.1
            });

            revealElements.forEach(el => {
                observer.observe(el);
            });
        }

        function setupParallaxEffect() {
            const cards = document.querySelectorAll('.component-card');
            cards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    const rotateX = ((y - centerY) / centerY) * -5;
                    const rotateY = ((x - centerX) / centerX) * 5;

                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
                });

                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)';
                });
            });
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            populateGrid();
            setupScrollReveal();
            setupParallaxEffect();
        });

    </script>
</body>
</html>
