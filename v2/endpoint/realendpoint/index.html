<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        label, input, textarea {
            display: block;
            margin: 10px 0;
        }
        button {
            margin: 10px 0;
        }
        #response {
            margin-top: 20px;
            white-space: pre-wrap;
        }
        .corner {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 0.8em;
            color: gray;
        }
        #output {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>API Interface</h1>
    <h2>Api Link</h2>
    <label>https://api.hugebonus.xyz/v2/endpoint</label>
    <!-- Form for POST request -->
    <h2>POST Data</h2>
    <label for="post-key">Key:</label>
    <input type="text" id="post-key" placeholder="Enter key">
    
    <label for="post-value">Value (JSON format):</label>
    <textarea id="post-value" rows="4" placeholder='{"Key":"Sigma!"}'></textarea>

    <button onclick="sendPostRequest()">Send POST Request</button>

    <!-- Form for GET request -->
    <h2>GET Data</h2>
    <label for="get-key">Key:</label>
    <input type="text" id="get-key" placeholder="Enter key">

    <button onclick="sendGetRequest()">Send GET Request</button>

    <!-- Button to Check Valid Keys -->
    <h2>Check Valid Keys</h2>
    <button onclick="checkValidKeys()">Check Valid Keys</button>

    <!-- Form for DELETE request -->
    <h2>DELETE Data</h2>
    <label for="delete-key">Key:</label>
    <input type="text" id="delete-key" placeholder="Enter key">

    <button onclick="confirmAndSendDeleteRequest()">Delete Data</button>

    <!-- Form for Webhook -->
    <h2>Send Webhook</h2>
    <label for="webhook-url">Webhook URL:</label>
    <input type="text" id="webhook-url" placeholder="Enter webhook URL">

    <label for="webhook-data">JSON Data:</label>
    <textarea id="webhook-data" rows="4" placeholder='{"content":"Webhook message!"}'></textarea>

    <button onclick="sendWebhook()">Send Webhook</button>

    <!-- Response Section -->
    <div id="response">
        <h3>Response:</h3>
        <div id="output" style="color: blue;">Status: Waiting for action...</div>
    </div>
    
    <!-- Display Version -->
    <div class="corner">Version 1.1.3</div>

    <script>
        const apiUrl = 'https://api.hugebonus.xyz/v2/endpoint/'; // Replace with your actual Cloudflare Worker URL

        // Function to send POST request
        async function sendPostRequest() {
            const key = document.getElementById('post-key').value;
            const value = document.getElementById('post-value').value;

            updateStatus('Sending POST request...', 'blue');
            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        key: key,
                        value: JSON.parse(value)
                    }),
                });
                const text = await response.text();
                updateStatus('POST Request Successful!', 'green');
                document.getElementById('output').innerText = `POST Response: ${text}`;
            } catch (error) {
                updateStatus('POST Request Failed!', 'red');
                document.getElementById('output').innerText = `Error: ${error.message}`;
            }
        }

        // Function to send GET request
        async function sendGetRequest() {
            const key = document.getElementById('get-key').value;

            updateStatus('Sending GET request...', 'blue');
            try {
                const response = await fetch(`${apiUrl}?key=${key}`);
                const data = await response.json();
                updateStatus('GET Request Successful!', 'green');
                document.getElementById('output').innerText = `GET Response: ${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                updateStatus('GET Request Failed!', 'red');
                document.getElementById('output').innerText = `Error: ${error.message}`;
            }
        }

        // Function to check valid keys
        async function checkValidKeys() {
            updateStatus('Checking Valid Keys...', 'blue');

            try {
                const response = await fetch(`${apiUrl}?checkall=true`);
                const data = await response.json();
                updateStatus('Valid Keys Retrieved!', 'green');
                document.getElementById('output').innerText = `Valid Keys: ${data.join(', ')}`;
            } catch (error) {
                updateStatus('Failed to Retrieve Valid Keys!', 'red');
                document.getElementById('output').innerText = `Error: ${error.message}`;
            }
        }

        // Function to send DELETE request
        async function sendDeleteRequest() {
            const key = document.getElementById('delete-key').value;

            updateStatus('Sending DELETE request...', 'blue');
            try {
                const response = await fetch(apiUrl, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ key: key }),
                });
                const text = await response.text();
                updateStatus('DELETE Request Successful!', 'green');
                document.getElementById('output').innerText = `DELETE Response: ${text}`;
            } catch (error) {
                updateStatus('DELETE Request Failed!', 'red');
                document.getElementById('output').innerText = `Error: ${error.message}`;
            }
        }

        // Function to confirm and send DELETE request
        function confirmAndSendDeleteRequest() {
            const key = document.getElementById('delete-key').value;

            if (key) {
                const confirmDelete = window.confirm(`Are you sure you want to delete the key: "${key}"?`);
                if (confirmDelete) {
                    sendDeleteRequest();
                } else {
                    updateStatus('DELETE Request Cancelled.', 'orange');
                }
            } else {
                updateStatus('Please provide a key for deletion.', 'red');
            }
        }

        // Function to send webhook
        async function sendWebhook() {
            const webhookUrl = document.getElementById('webhook-url').value;
            const webhookData = document.getElementById('webhook-data').value;

            if (!webhookUrl) {
                updateStatus('Enter webhook link.', 'red');
                return;
            }

            updateStatus('Sending Webhook...', 'blue');
            try {
                const response = await fetch(`${apiUrl}?type=webhook&url=${encodeURIComponent(webhookUrl)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: webhookData,
                });

                const text = await response.text();
                updateStatus('Webhook Sent Successfully!', 'green');
                document.getElementById('output').innerText = `Webhook Response: ${text}`;
            } catch (error) {
                updateStatus('Webhook Failed to Send!', 'red');
                document.getElementById('output').innerText = `Error: ${error.message}`;
            }
        }

        // Function to update status with color
        function updateStatus(message, color) {
            const output = document.getElementById('output');
            output.innerText = `Status: ${message}`;
            output.style.color = color;
        }
    </script>

</body>
</html>
