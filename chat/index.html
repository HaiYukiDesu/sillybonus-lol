<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-g">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bwaaa Chat</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #1a1a1a; color: #e0e0e0; margin: 0; }
        #chat-container { display: flex; flex-direction: column; height: 100vh; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; }
        #message-form { display: flex; padding: 10px; border-top: 1px solid #444; }
        #message-input { flex-grow: 1; padding: 10px; border-radius: 20px; border: none; background-color: #333; color: #fff; }
        button { padding: 10px 20px; margin-left: 10px; border-radius: 20px; border: none; background-color: #007bff; color: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="messages">
            </div>
        <form id="message-form">
            <input type="text" id="message-input" placeholder="Type an encrypted message..." autocomplete="off">
            <button type="submit">Send</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
