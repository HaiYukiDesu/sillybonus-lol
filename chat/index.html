<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silly Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/phosphor-icons/1.4.2/css/phosphor.min.css" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { '50': '#f0f9ff', '100': '#e0f2fe', '200': '#bae6fd', '300': '#7dd3fc', '400': '#38bdf8', '500': '#0ea5e9', '600': '#0284c7', '700': '#0369a1', '800': '#075985', '900': '#0c4a6e', '950': '#082f49' } } } } }
    </script>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200 flex items-center justify-center min-h-screen p-4">
    <div id="notification-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>
    <main id="app-root" class="w-full h-full max-w-4xl mx-auto"></main>
    <style>
        .notification{background:white;color:#1e293b;padding:1rem;border-radius:.5rem;box-shadow:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.1);font-weight:500;transform:translateX(120%);animation:slideIn .5s forwards}.dark .notification{background:#1e293b;color:#f1f5f9}@keyframes slideIn{to{transform:translateX(0)}}
        .message-actions{opacity:0;transition:opacity .2s}.message-line:hover .message-actions{opacity:1}
    </style>
    <script>
        const API_BASE = "https://chat.itbon.us";
        const WS_BASE = "wss://chat.itbon.us";
        let state = { user: null, currentRoom: null, ws: null, encryptionKey: null, messages: [] };

        const appRoot = document.getElementById('app-root');
        const showNotification = (message, duration = 3000) => { const container = document.getElementById('notification-container'); const notif = document.createElement('div'); notif.className = 'notification'; notif.textContent = message; container.appendChild(notif); setTimeout(() => { notif.remove(); }, duration); };
        const apiRequest = async (endpoint, options = {}) => { options.credentials = 'include'; options.headers = { ...options.headers, 'Content-Type': 'application/json' }; const response = await fetch(`${API_BASE}${endpoint}`, options); if (!response.ok) { const errorText = await response.text(); throw new Error(errorText || `HTTP error! status: ${response.status}`); } if (response.headers.get('Content-Type')?.includes('application/json')) return response.json(); return response.text(); };

        const navigate = (path) => { history.pushState({}, '', path); render(); };

        const render = async () => {
            const path = window.location.pathname;
            let html = '';
            if (!state.user) {
                if (path === '/signup') { html = SignupPage(); }
                else { html = LoginPage(); }
            } else {
                if (path.startsWith('/chat/')) { html = ChatPage(); }
                else { html = LobbyPage(); }
            }
            appRoot.innerHTML = html;
            attachEventListeners();
            if (path.startsWith('/chat/')) {
                const roomId = path.split('/')[2];
                if (state.currentRoom?.id !== roomId) {
                    await joinRoom(roomId);
                }
                renderMessages();
            }
        };

        const LoginPage = () => `<div class="max-w-md mx-auto w-full"><div class="bg-white dark:bg-slate-800 shadow-lg rounded-xl p-8"><h2 class="text-2xl font-bold text-center mb-6">Login to Silly Chat</h2><form id="login-form"><div class="mb-4"><label for="login-user" class="block mb-2">Username</label><input type="text" id="login-user" class="w-full p-2 border rounded dark:bg-slate-700 dark:border-slate-600"></div><div class="mb-6"><label for="login-pass" class="block mb-2">Password</label><input type="password" id="login-pass" class="w-full p-2 border rounded dark:bg-slate-700 dark:border-slate-600"></div><button type="submit" class="w-full bg-primary-600 text-white p-2 rounded hover:bg-primary-700">Login</button></form><p class="text-center mt-4">No account? <a href="/signup" class="text-primary-500 hover:underline" id="nav-signup">Register here</a></p></div></div>`;
        const SignupPage = () => `<div class="max-w-md mx-auto w-full"><div class="bg-white dark:bg-slate-800 shadow-lg rounded-xl p-8"><h2 class="text-2xl font-bold text-center mb-6">Create an Account</h2><form id="signup-form"><div class="mb-4"><label for="signup-user" class="block mb-2">Username</label><input type="text" id="signup-user" class="w-full p-2 border rounded dark:bg-slate-700 dark:border-slate-600"></div><div class="mb-4"><label for="signup-pass" class="block mb-2">Password</label><input type="password" id="signup-pass" class="w-full p-2 border rounded dark:bg-slate-700 dark:border-slate-600"></div><div class="mb-6"><label for="signup-referral" class="block mb-2">Referral Code</label><input type="text" id="signup-referral" class="w-full p-2 border rounded dark:bg-slate-700 dark:border-slate-600"></div><button type="submit" class="w-full bg-primary-600 text-white p-2 rounded hover:bg-primary-700">Register</button></form><p class="text-center mt-4">Already have an account? <a href="/login" class="text-primary-500 hover:underline" id="nav-login">Login here</a></p></div></div>`;
        const LobbyPage = () => `<div class="max-w-md mx-auto w-full"><div class="bg-white dark:bg-slate-800 shadow-lg rounded-xl p-8"><h2 class="text-2xl font-bold text-center mb-6">Welcome, ${state.user.username}!</h2><div class="mb-6"><h3 class="font-semibold mb-2">Join a Room</h3><form id="join-form" class="flex"><input type="text" id="join-room-name" placeholder="Enter room name or ID" class="flex-grow p-2 border rounded-l dark:bg-slate-700 dark:border-slate-600"><button type="submit" class="bg-primary-600 text-white p-2 rounded-r hover:bg-primary-700">Join</button></form></div><div><h3 class="font-semibold mb-2">Or Create a New One</h3><form id="create-form"><div class="mb-4"><input type="text" id="create-room-name" placeholder="New room name" class="w-full p-2 border rounded dark:bg-slate-700 dark:border-slate-600"></div><div class="mb-4"><label class="flex items-center"><input type="checkbox" id="create-e2ee" class="mr-2"> Enable E2EE</label></div><button type="submit" class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">Create Room</button></form></div></div></div>`;
        const ChatPage = () => `<div class="w-full h-full max-h-[90vh] flex flex-col bg-white dark:bg-slate-800 shadow-lg rounded-xl"><div class="p-4 border-b dark:border-slate-700 flex justify-between items-center"><h2 class="text-xl font-bold">${state.currentRoom?.name || 'Loading...'}</h2><a href="/chat" id="nav-lobby" class="text-sm text-primary-500 hover:underline">Leave</a></div><div id="messages" class="flex-1 p-4 overflow-y-auto"></div><form id="message-form" class="p-4 border-t dark:border-slate-700 flex gap-2"><input id="message-input" class="w-full p-2 border rounded dark:bg-slate-700 dark:border-slate-600" placeholder="Type a message..."><button type="submit" class="bg-primary-600 text-white px-4 rounded hover:bg-primary-700">Send</button></form></div>`;

        const renderMessages = async () => {
            const messagesEl = document.getElementById('messages');
            if (!messagesEl) return;
            messagesEl.innerHTML = '';
            for (const msg of state.messages) {
                let content = msg.message;
                if (msg.is_encrypted && state.encryptionKey) { try { content = await decryptMessage(msg.ciphertext); } catch (e) { content = 'Failed to decrypt message'; } }
                const isOwn = msg.userId === state.user.username;
                const div = document.createElement('div');
                div.className = `message-line flex flex-col ${isOwn ? 'items-end' : 'items-start'}`;
                div.innerHTML = `<div class="message-bubble ${isOwn ? 'bg-primary-500 text-white' : 'bg-slate-200 dark:bg-slate-700'} rounded-lg p-2 max-w-xs md:max-w-md"><div class="font-bold text-sm">${msg.userId}</div><div>${content}</div></div>`;
                messagesEl.appendChild(div);
            }
            messagesEl.scrollTop = messagesEl.scrollHeight;
        };

        const attachEventListeners = () => {
            const path = window.location.pathname;
            document.querySelectorAll('a[href]').forEach(a => { a.onclick = (e) => { e.preventDefault(); navigate(a.getAttribute('href')); } });
            if (!state.user) {
                const loginForm = document.getElementById('login-form');
                if (loginForm) loginForm.onsubmit = async (e) => { e.preventDefault(); try { const res = await apiRequest('/api/auth/login', { method: 'POST', body: JSON.stringify({ username: e.target['login-user'].value, password: e.target['login-pass'].value }) }); state.user = { username: res.username }; navigate('/chat'); } catch (err) { showNotification(err.message); }};
                const signupForm = document.getElementById('signup-form');
                if (signupForm) signupForm.onsubmit = async (e) => { e.preventDefault(); try { await apiRequest('/api/auth/register', { method: 'POST', body: JSON.stringify({ username: e.target['signup-user'].value, password: e.target['signup-pass'].value, referralCode: e.target['signup-referral'].value }) }); showNotification('Registration successful!'); navigate('/login'); } catch (err) { showNotification(err.message); }};
            } else {
                const joinForm = document.getElementById('join-form');
                if (joinForm) joinForm.onsubmit = async (e) => { e.preventDefault(); try { const roomInfo = await apiRequest(`/api/room-info?name=${e.target['join-room-name'].value}`); navigate(`/chat/${roomInfo.id}`); } catch(err) { showNotification('Room not found.'); } };
                const createForm = document.getElementById('create-form');
                if (createForm) createForm.onsubmit = async (e) => { e.preventDefault(); try { const res = await apiRequest('/api/create-room', { method: 'POST', body: JSON.stringify({ roomName: e.target['create-room-name'].value, e2ee_enabled: e.target['create-e2ee'].checked }) }); showNotification(`Room '${res.roomName}' created!`); if (res.key) { alert('IMPORTANT: Securely copy and share this E2EE key:\n\n' + res.key); } navigate(`/chat/${res.roomId}`); } catch(err) { showNotification(err.message); } };
                const messageForm = document.getElementById('message-form');
                if (messageForm) messageForm.onsubmit = (e) => { e.preventDefault(); sendMessage(); };
            }
        };
        
        async function joinRoom(roomId) {
            try {
                const roomInfo = await apiRequest(`/api/room-info?id=${roomId}`);
                state.currentRoom = roomInfo;
                if (roomInfo.e2ee_enabled) {
                    const { key } = await apiRequest(`/api/room/key?roomId=${roomId}`);
                    state.encryptionKey = await importKey(key);
                } else {
                    state.encryptionKey = null;
                }
                const history = await apiRequest(`/api/history?roomId=${roomId}`);
                state.messages = history;
                connectWebSocket();
            } catch (err) {
                showNotification(err.message);
                navigate('/chat');
            }
        }
        
        const connectWebSocket = () => {
            if (state.ws) { state.ws.close(); }
            const ws = new WebSocket(`${WS_BASE}/websocket?roomId=${state.currentRoom.id}`);
            ws.onopen = () => showNotification(`Connected to room: ${state.currentRoom.name}`);
            ws.onmessage = handleIncomingMessage;
            ws.onclose = () => showNotification("Connection lost. Please refresh.");
            ws.onerror = () => showNotification("WebSocket error.");
            setInterval(() => { if (ws.readyState === WebSocket.OPEN) ws.send('ping'); }, 30000);
            state.ws = ws;
        };

        const handleIncomingMessage = (event) => {
            if (event.data === 'pong') return;
            const message = JSON.parse(event.data);
            if (message.type === 'edit') { const index = state.messages.findIndex(m => m.id === message.id); if (index > -1) { state.messages[index].message = message.content; state.messages[index].ciphertext = message.isEncrypted ? message.content : null; } }
            else if (message.type === 'delete') { state.messages = state.messages.filter(m => m.id !== message.id); }
            else { state.messages.push(message); }
            renderMessages();
        };

        const sendMessage = async () => {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message || !state.ws || state.ws.readyState !== WebSocket.OPEN) return;
            const isEncrypted = !!state.encryptionKey;
            const payload = { message: isEncrypted ? null : message, ciphertext: isEncrypted ? await encryptMessage(message) : null };
            await apiRequest(`/api/message?roomId=${state.currentRoom.id}`, { method: 'POST', body: JSON.stringify(payload) });
            input.value = '';
        };

        const deleteMessage = async (messageId) => { await apiRequest(`/api/message/${messageId}`, { method: 'DELETE' }); };
        const editMessage = async (messageId, newContent) => { const isEncrypted = !!state.encryptionKey; const content = isEncrypted ? await encryptMessage(newContent) : newContent; await apiRequest(`/api/message/${messageId}`, { method: 'PATCH', body: JSON.stringify({ content, isEncrypted }) }); };

        async function encryptMessage(message) { const iv = crypto.getRandomValues(new Uint8Array(12)); const encoded = new TextEncoder().encode(message); const encryptedContent = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, state.encryptionKey, encoded); const buffer = new Uint8Array(iv.byteLength + encryptedContent.byteLength); buffer.set(new Uint8Array(iv), 0); buffer.set(new Uint8Array(encryptedContent), iv.byteLength); return btoa(String.fromCharCode.apply(null, buffer)); }
        async function decryptMessage(b64data) { const buffer = Uint8Array.from(atob(b64data), c => c.charCodeAt(0)); const iv = buffer.slice(0, 12); const data = buffer.slice(12); const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, state.encryptionKey, data); return new TextDecoder().decode(decrypted); }
        async function importKey(b64key) { const raw = Uint8Array.from(atob(b64key), c => c.charCodeAt(0)); return crypto.subtle.importKey("raw", raw, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]); }

        window.addEventListener('popstate', render);
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const data = await apiRequest('/api/auth/me');
                state.user = data;
                if (!window.location.pathname.startsWith('/chat')) {
                    navigate('/chat');
                } else {
                    render();
                }
            } catch (e) {
                if (window.location.pathname !== '/signup') {
                    navigate('/login');
                } else {
                    render();
                }
            }
        });
    </script>
</body>
</html>
